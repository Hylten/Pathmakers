    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              pathmaker: {
                dark: '#050505', // Deep Black (Main Background)
                primary: '#121212', // Dark Charcoal (Cards/Sections)

                gold: '#a38a6a', // Alias
                light: '#1c1c1c', // Lighter Charcoal (Hovers)

              'titan-gradient': 'linear-gradient(to bottom, #050505, #121212)',
            }
          }
        }
      }

    <style>
      body {

      ::-webkit-scrollbar-track {
